<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flood Risk Alert — {{ region_name }}</title>
</head>
<body style="margin:0;padding:0;font-family:Arial,sans-serif;background:#f4f4f4;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:32px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:6px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="background:#b91c1c;padding:24px 32px;">
              <h1 style="margin:0;color:#ffffff;font-size:20px;letter-spacing:0.5px;">
                {{ risk_level | upper }} FLOOD RISK — {{ region_name }}
              </h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 16px;color:#111827;font-size:15px;line-height:1.6;">
                {{ message }}
              </p>
              {% if confidence_score is not none %}
              <p style="margin:0;color:#6b7280;font-size:13px;">
                Model confidence: <strong>{{ confidence_score }}%</strong>
              </p>
              {% endif %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f9fafb;padding:16px 32px;border-top:1px solid #e5e7eb;">
              <p style="margin:0;color:#6b7280;font-size:12px;">
                This is an automated alert from Rwanda Resilience Hub.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
